      <feBlend mode="soft-light" in2="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
