<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Aerial view of a winding river through green forests at sunset">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7b267"/>
      <stop offset="38%" stop-color="#f79d65"/>
      <stop offset="100%" stop-color="#3b6a57"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="72%" cy="18%" r="38%">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffd9a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#99d8ff"/>
      <stop offset="55%" stop-color="#7fbbe5"/>
      <stop offset="100%" stop-color="#5b8fb7"/>
    </linearGradient>
    <filter id="softNoise" x="-20%" y="-20%" width="140%" height="140%">
